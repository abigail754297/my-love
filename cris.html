<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Mi Amor 💖</title>

    <style>
        body {
            font-family: 'Georgia', serif;
            background: linear-gradient(to right, #ffe0ec, #fff);
            text-align: center;
            margin: 0;
            padding: 0;
        }

        .carta {
            background: white;
            max-width: 600px;
            margin: 80px auto;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            animation: aparecer 2s ease;
        }

        @keyframes aparecer {
            from {opacity: 0; transform: scale(0.9);}
            to {opacity: 1; transform: scale(1);}
        }

        h1 {
            color: #e91e63;
        }

        p {
            font-size: 1.3em;
            color: #444;
            line-height: 1.6;
        }

        .heart {
            font-size: 80px;
            animation: latido 1.5s infinite;
        }

        @keyframes latido {
            0% {transform: scale(1);}
            50% {transform: scale(1.2);}
            100% {transform: scale(1);}
        }

        iframe {
            margin-top: 20px;
            width: 100%;
            height: 200px;
            border-radius: 10px;
        }

        .btn {
            margin-top: 15px;
            padding: 10px 20px;
            background: #e91e63;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1em;
        }
    </style>
</head>
<body>

    <div class="carta">
        <h1>Para mi amor eterno 💕</h1>

        <p>
            Mi amor,<br><br>
            Desde que llegaste a mi vida, todo es más bonito, más especial… más tú.
            Cada momento contigo es un recuerdo que guardo en lo más profundo de mi corazón.
            <br><br>
            Gracias por existir, por hacerme feliz y por ser mi todo.
            <br><br>
            Te amo hoy, mañana y siempre. ❤️
        </p>

        <div class="heart">💖</div>

        <!-- Video con autoplay -->
        <iframe 
            id="video"
            src="https://www.youtube.com/embed/F7q3P7-j4vU?autoplay=1&mute=0&enablejsapi=1"
            title="Video romántico"
            allow="autoplay; encrypted-media"
            allowfullscreen>
        </iframe>
        <iframe 
    id="video"
    src="https://www.youtube.com/embed/F7q3P7-j4vU?autoplay=1&mute=1&enablejsapi=1" 
    title="Video romántico"
    allow="autoplay; encrypted-media" 
    allowfullscreen>
</iframe>

<button class="btn" onclick="activarSonido()">💖 Toca aquí para la música 💖</button>

</body>
</html>
